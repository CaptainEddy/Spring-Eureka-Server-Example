server:
  port: 8689
spring:
  application:
    name: API-Gateway
  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: Order-Info-Service
              uri: lb://ORDER-SERVICE
              predicates:
                - Path=/order/**
            - id: Payment-Info-Service
              uri: lb://PAYMENT-SERVICE
              predicates:
                - Path=/payment/**


eureka:
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${random.value}
  client:
    fetch-registry: true
    register-with-eureka: true
    serviceUrl:
      defaultZone: http://localhost:8761/eureka
